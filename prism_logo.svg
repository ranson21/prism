<svg width="360" height="100" viewBox="0 0 360 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Prism Icon -->
  <polygon points="20,20 20,80 60,50" fill="#1F2937"/>

  <!-- Incoming line -->
  <line x1="5" y1="50" x2="20" y2="50" stroke="#38BDF8" stroke-width="2"/>

  <!-- Outgoing lines (risk signals) -->
  <line x1="60" y1="50" x2="100" y2="35" stroke="#22C55E" stroke-width="2"/>
  <line x1="60" y1="50" x2="100" y2="50" stroke="#EAB308" stroke-width="2"/>
  <line x1="60" y1="50" x2="100" y2="65" stroke="#DC2626" stroke-width="2"/>

  <!-- Main PRISM Text -->
  <text x="120" y="50" fill="#E5E7EB" font-size="28" font-family="Inter, sans-serif" font-weight="600">
    PRISM
  </text>

  <!-- Acronym Spelled Out -->
  <text x="120" y="70" fill="#9CA3AF" font-size="12" font-family="Inter, sans-serif" font-weight="500">
    Prioritization of Risk & Incident Support Model
  </text>

  <!-- Powered by -->
  <text x="120" y="85" fill="#6B7280" font-size="10" font-family="Inter, sans-serif" font-weight="400">
    Powered by Sky Solutions LLC
  </text>
</svg>