<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle: navy matches app bg -->
  <circle cx="32" cy="32" r="32" fill="#0F172A"/>
  <!-- Prism shape: subtle fill, bright stroke for contrast -->
  <polygon points="14,15 14,49 43,32" fill="#1E293B" stroke="#7DD3FC" stroke-width="2"/>
  <!-- Incoming beam -->
  <line x1="5" y1="32" x2="14" y2="32" stroke="#7DD3FC" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Outgoing beams: all pass 3:1 against #0F172A -->
  <line x1="43" y1="32" x2="59" y2="22" stroke="#4ADE80" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="32" x2="59" y2="32" stroke="#FDE047" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="32" x2="59" y2="42" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
</svg>
