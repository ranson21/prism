version: "2"
sql:
  - engine: "postgresql"
    schema: "../../environments/local/migrations/001_init_schema.sql"
    queries: "sql/queries"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
