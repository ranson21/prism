version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "../../environments/local/migrations/001_init_schema.sql"
      - "../../environments/local/migrations/002_add_economic_exposure.sql"
      - "../../environments/local/migrations/003_add_vulnerability_features.sql"
      - "../../environments/local/migrations/004_add_cluster_to_scores.sql"
    queries: "sql/queries"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
